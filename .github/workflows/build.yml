# Build portable Windows x86_64 executable for FLEx List Migrator
#
# Uses a standard GitHub-hosted Windows runner (x86_64).  No self-hosted
# runner or local Windows machine required.
#
# HOW IT AVOIDS THE FLEx-ON-CI PROBLEM
# flexlibs2 loads FLEx DLLs at module import time.  We work around this by
# NOT importing flexlibs2 during the PyInstaller analysis phase — instead,
# build.spec uses importlib.util.find_spec() to locate the package directory
# and adds it as a 'datas' entry.  PyInstaller bundles the raw .py files;
# they are importable at runtime (sys._MEIPASS is on sys.path in a frozen app).
# pythonnet/clr is safe to import and bundle without FLEx installed.
#
# TRIGGERING A BUILD
#   Manually:  GitHub → Actions → "Build Windows Executable" → Run workflow
#   On tag:    git tag v1.0.1 && git push origin v1.0.1

name: Build Windows Executable

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: windows-latest     # GitHub-hosted x86_64 Windows — no FLEx needed

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          architecture: 'x64'

      - name: Read version
        id: ver
        shell: python
        run: |
          import os, importlib.util
          spec = importlib.util.spec_from_file_location("version", "version.py")
          mod  = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(mod)
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"version={mod.__version__}\n")

      - name: Clone flexlibs2
        run: git clone https://github.com/MattGyverLee/flexlibs.git flexlibs2_src

      - name: Install flexlibs2
        # pip install copies the package files into site-packages.
        # It does NOT import the package, so FLEx DLL loads are never triggered.
        run: pip install ./flexlibs2_src

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build executable
        # build.spec locates flexlibs2 via find_spec (no import) and bundles
        # it as .py data files — FLEx DLL loads only happen at user runtime.
        run: pyinstaller build.spec --noconfirm

      - name: Verify output
        run: |
          $exe = "dist\FLEx List Migrator.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "Build failed — output not found: $exe"
            exit 1
          }
          $mb = [math]::Round((Get-Item $exe).Length / 1MB, 1)
          Write-Host "Built: $exe  ($mb MB)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FLEx-List-Migrator-${{ steps.ver.outputs.version }}-win-x64
          path: dist/FLEx List Migrator.exe
          if-no-files-found: error
