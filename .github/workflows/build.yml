# Build portable Windows executable for FLEx List Migrator
#
# ── WHY SELF-HOSTED ───────────────────────────────────────────────────────────
# flexlibs2 loads FLEx's LCM DLLs (FwUtils, SIL.LCModel, etc.) at *module
# import time* via clr.AddReference().  PyInstaller's analysis phase imports
# every collected module, so those calls execute during the build.
# A hosted GitHub runner has no FLEx installed → every clr.AddReference()
# call fails → build crashes.
#
# The self-hosted runner runs on the Windows machine where FLEx is already
# installed, so module-level DLL loads succeed normally.
#
# ── SELF-HOSTED RUNNER SETUP (one-time, ~10 min) ─────────────────────────────
# 1. On the Windows machine (Parallels VM or native), open a browser and go to:
#      https://github.com/rulingAnts/flex-list-migrator/settings/actions/runners
# 2. Click "New self-hosted runner" → Windows → x64
# 3. Follow the instructions (download, configure, start the runner service).
#    When asked for labels, add:  flex-build
# 4. Start the runner as a service so it survives reboots:
#      .\svc.ps1 install
#      .\svc.ps1 start
#
# ── TRIGGERING A BUILD ────────────────────────────────────────────────────────
# Manually:  GitHub → Actions → "Build Windows Executable" → Run workflow
# On tag:    git tag v1.0.0 && git push origin v1.0.0

name: Build Windows Executable

on:
  workflow_dispatch:          # manual trigger from GitHub Actions UI
  push:
    tags:
      - 'v*.*.*'              # triggers on version tags like v1.0.1

jobs:
  build:
    # Runs on your self-hosted Windows runner (FLEx must be installed there).
    # The runner must have the label 'flex-build' set during registration.
    runs-on: [self-hosted, Windows, X64, flex-build]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read version
        id: ver
        shell: python
        run: |
          import os, importlib.util
          spec = importlib.util.spec_from_file_location("version", "version.py")
          mod  = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(mod)
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"version={mod.__version__}\n")

      - name: Clone flexlibs2
        run: |
          if (Test-Path "../flexlibs2_ci") { Remove-Item -Recurse -Force "../flexlibs2_ci" }
          git clone https://github.com/MattGyverLee/flexlibs.git ../flexlibs2_ci

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ../flexlibs2_ci
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller build.spec --noconfirm

      - name: Verify output
        run: |
          $exe = "dist\FLEx List Migrator.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "Build failed: $exe not found"
            exit 1
          }
          $size = (Get-Item $exe).Length / 1MB
          Write-Host "Built: $exe  ($([math]::Round($size, 1)) MB)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FLEx-List-Migrator-${{ steps.ver.outputs.version }}-win-x64
          path: dist/FLEx List Migrator.exe
          if-no-files-found: error
